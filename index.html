<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">  
    <script src="script.js" defer></script>  
</head>
<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-circle-arrow-up"></i>
            <h2>Tally Counter</h2>
        </div>

        <div class="theme-btn" title="Switch Theme">
            <i class="fa-solid fa-moon"></i>
        </div>
    </header>

    <main>
        <div class="counter-container">
            <div class="counter-screen">
                <p id="counter">Click '+' to start counting</p>
            </div>

            <div class="btns">
                <div>
                    <button class="btn" id="js-decrement">-</button>
                    <button class="btn" id="js-increment">+</button>
                </div>
            
                <button class="btn" id="js-reset">Reset</button>
            </div>
        </div>
    </main>
</body>
</html>
